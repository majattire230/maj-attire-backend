<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Collections — M.A.J Attire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--white:#f5f0eb;--cream:#ede8e0;--gold:#c9a96e;--charcoal:#2a2a2a;--mid:#6b6560;--accent:#8b3a3a}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.2rem 4rem;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;letter-spacing:0.25em;color:var(--white);text-decoration:none}
.nav-logo span{color:var(--gold)}
.nav-back{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid rgba(201,169,110,0.4);padding:0.5rem 1.2rem;transition:all 0.3s}
.nav-back:hover{background:var(--gold);color:var(--black)}
.nav-actions{display:flex;align-items:center;gap:1rem}
.nav-actions button{background:none;border:none;cursor:pointer;color:var(--white);font-size:1.1rem;opacity:0.8;transition:opacity 0.3s}
.nav-actions button:hover{opacity:1}
.cart-btn{position:relative}
.cart-count{position:absolute;top:-6px;right:-8px;background:var(--gold);color:var(--black);font-size:0.5rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all 0.3s}
.cart-count.visible{opacity:1;transform:scale(1)}
.collections-hero{background:var(--black);padding:8rem 4rem 4rem;text-align:center;position:relative;overflow:hidden}
.collections-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,110,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.04) 1px,transparent 1px);background-size:60px 60px}
.collections-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:300;color:var(--white);letter-spacing:0.1em;position:relative}
.collections-hero h1 em{color:var(--gold);font-style:italic}
.collections-hero p{color:var(--mid);font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;margin-top:1rem;position:relative}
.breadcrumb{position:relative;margin-bottom:1rem;font-size:0.6rem;letter-spacing:0.2em;color:var(--mid);text-transform:uppercase}
.breadcrumb a{color:var(--gold);text-decoration:none}
.filter-bar{background:var(--cream);padding:1.5rem 4rem;position:sticky;top:60px;z-index:900;border-bottom:1px solid rgba(10,10,10,0.08);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.filter-label{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--mid)}
.filter-tabs{display:flex;gap:0.5rem;flex-wrap:wrap;flex:1}
.filter-tab{padding:0.5rem 1.2rem;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;font-family:'Montserrat',sans-serif;background:transparent;border:1px solid rgba(10,10,10,0.2);cursor:pointer;transition:all 0.3s;color:var(--mid)}
.filter-tab:hover{border-color:var(--gold);color:var(--black)}
.filter-tab.active{background:var(--black);color:var(--white);border-color:var(--black)}
.results-count{font-size:0.6rem;letter-spacing:0.15em;color:var(--mid);white-space:nowrap}
.sort-select{padding:0.5rem 1rem;font-size:0.6rem;font-family:'Montserrat',sans-serif;border:1px solid rgba(10,10,10,0.2);background:var(--white);cursor:pointer;color:var(--charcoal);letter-spacing:0.1em;outline:none}
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{padding:0.5rem 2.2rem 0.5rem 0.9rem;font-size:0.6rem;font-family:'Montserrat',sans-serif;border:1px solid rgba(10,10,10,0.2);background:var(--white);color:var(--charcoal);letter-spacing:0.1em;outline:none;width:180px;transition:border-color 0.3s,width 0.3s}
.search-input:focus{border-color:var(--gold);width:220px}
.search-input::placeholder{color:var(--mid)}
.search-icon{position:absolute;right:0.6rem;font-size:0.75rem;color:var(--mid);pointer-events:none}
.search-clear{position:absolute;right:0.6rem;font-size:0.75rem;color:var(--mid);cursor:pointer;display:none;background:none;border:none;padding:0}
.no-results{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--mid)}
.no-results-icon{font-size:3rem;margin-bottom:1rem}
.no-results h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;margin-bottom:0.5rem;color:var(--black)}
.no-results p{font-size:0.7rem;letter-spacing:0.1em}
.collections-main{padding:3rem 4rem}
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;margin-bottom:4rem}
.product-card{cursor:pointer;animation:fadeUp 0.5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.product-image{aspect-ratio:3/4;position:relative;overflow:hidden;background:var(--cream)}
.product-img-bg{position:absolute;inset:0;transition:transform 0.6s ease}
.product-card:hover .product-img-bg{transform:scale(1.05)}
.product-badge{position:absolute;top:1rem;left:1rem;font-size:0.5rem;letter-spacing:0.2em;padding:0.3rem 0.7rem;z-index:2;text-transform:uppercase;font-weight:600}
.product-badge.new{background:var(--black);color:var(--gold)}
.product-badge.sale{background:var(--accent);color:var(--white)}
.product-actions-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:1.5rem;background:rgba(10,10,10,0);transition:background 0.3s;z-index:3}
.product-card:hover .product-actions-overlay{background:rgba(10,10,10,0.25)}
.quick-add{background:var(--white);color:var(--black);border:none;padding:0.8rem 1.5rem;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;font-family:'Montserrat',sans-serif;cursor:pointer;transform:translateY(20px);opacity:0;transition:all 0.3s;font-weight:600}
.product-card:hover .quick-add{transform:translateY(0);opacity:1}
.quick-add:hover{background:var(--gold)}
.wishlist-btn{position:absolute;top:1rem;right:1rem;background:rgba(245,240,235,0.9);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;z-index:4;opacity:0;transform:translateX(10px);transition:all 0.3s}
.product-card:hover .wishlist-btn{opacity:1;transform:translateX(0)}
.product-info{padding:1rem 0}
.product-category{font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem}
.product-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;margin-bottom:0.5rem;line-height:1.3}
.product-price{display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem}
.price-current{font-size:0.8rem;font-weight:600}
.price-sale{font-size:0.8rem;font-weight:600;color:var(--accent)}
.price-original{font-size:0.7rem;color:var(--mid);text-decoration:line-through}
.product-colors{display:flex;gap:0.4rem}
.color-swatch{width:12px;height:12px;border-radius:50%;border:1px solid rgba(10,10,10,0.1)}
.pattern-weave{background:linear-gradient(160deg,#1a1208 0%,#2d1f0a 50%,#1a0f0a 100%)}
.pattern-dots{background:radial-gradient(circle,#2a1a0a 1px,transparent 1px) 0 0/20px 20px,#1a1208}
.pattern-stripe{background:repeating-linear-gradient(45deg,#0d1a2d 0,#0d1a2d 2px,#1a2d1a 0,#1a2d1a 10px)}
.pattern-diamond{background-color:#0a1a0a;background-image:linear-gradient(45deg,rgba(201,169,110,.08) 25%,transparent 25%,transparent 75%,rgba(201,169,110,.08) 75%),linear-gradient(45deg,rgba(201,169,110,.08) 25%,transparent 25%,transparent 75%,rgba(201,169,110,.08) 75%);background-size:30px 30px;background-position:0 0,15px 15px}
.pattern-cross{background-color:#1a1a0a;background-image:linear-gradient(rgba(201,169,110,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,.06) 1px,transparent 1px);background-size:20px 20px}
.pattern-herringbone{background-color:#0d0d1a;background-image:repeating-linear-gradient(45deg,rgba(201,169,110,.07) 0,rgba(201,169,110,.07) 2px,transparent 0,transparent 10px),repeating-linear-gradient(-45deg,rgba(201,169,110,.07) 0,rgba(201,169,110,.07) 2px,transparent 0,transparent 10px)}
.loading-state{grid-column:1/-1;text-align:center;padding:4rem;color:var(--mid);font-size:0.7rem;letter-spacing:0.3em}
.loading-spinner{width:30px;height:30px;border:2px solid rgba(201,169,110,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.notification{position:fixed;bottom:2rem;right:2rem;background:var(--charcoal);color:var(--white);padding:1rem 1.5rem;font-size:0.7rem;letter-spacing:0.15em;z-index:3000;transform:translateY(150%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);border-left:3px solid var(--gold);max-width:300px;border-radius:2px}
.notification.show{transform:translateY(0)}
.cart-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.5);z-index:2000;opacity:0;visibility:hidden;transition:all 0.3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--white);z-index:2001;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-header{padding:2rem;border-bottom:1px solid rgba(10,10,10,0.08);display:flex;justify-content:space-between;align-items:center}
.cart-header h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300}
.cart-close{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--mid)}
.cart-items{flex:1;overflow-y:auto;padding:1rem 2rem}
.cart-empty{text-align:center;padding:3rem 0;color:var(--mid);font-size:0.7rem;letter-spacing:0.2em}
.cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid rgba(10,10,10,0.06)}
.cart-item-img{width:70px;height:80px;background:var(--cream);flex-shrink:0;overflow:hidden}
.cart-item-info{flex:1}
.cart-item-name{font-size:0.8rem;font-weight:500;margin-bottom:0.3rem}
.cart-item-details{font-size:0.6rem;color:var(--mid);letter-spacing:0.1em;margin-bottom:0.5rem}
.cart-item-price{font-size:0.75rem;font-weight:600}
.cart-item-remove{background:none;border:none;color:var(--mid);cursor:pointer;font-size:0.8rem}
.cart-footer{padding:2rem;border-top:1px solid rgba(10,10,10,0.08)}
.cart-total{display:flex;justify-content:space-between;font-size:0.8rem;font-weight:600;margin-bottom:1.5rem;letter-spacing:0.05em}
.checkout-btn{width:100%;padding:1rem;background:var(--black);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;margin-bottom:1rem}
.checkout-btn:hover{background:var(--gold);color:var(--black)}
.modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.8);z-index:4000;opacity:0;visibility:hidden;display:flex;align-items:center;justify-content:center;transition:all 0.3s;padding:1rem}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--white);width:90%;max-width:900px;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;position:relative;transform:translateY(20px);transition:transform 0.3s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-image{aspect-ratio:3/4;overflow:hidden}
.modal-info{padding:2.5rem;display:flex;flex-direction:column;gap:1.2rem}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--black);border:none;color:var(--white);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;z-index:5;display:flex;align-items:center;justify-content:center}
.modal-category{font-size:0.55rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold)}
.modal-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;line-height:1.2}
.modal-desc{font-size:0.75rem;color:var(--mid);line-height:1.7}
.modal-price{font-size:1.2rem;font-weight:600}
.size-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--mid);margin-bottom:0.5rem}
.size-options{display:flex;gap:0.5rem;flex-wrap:wrap}
.size-btn{padding:0.4rem 0.8rem;border:1px solid rgba(10,10,10,0.2);background:none;cursor:pointer;font-size:0.65rem;font-family:'Montserrat',sans-serif;transition:all 0.2s}
.size-btn:hover,.size-btn.selected{background:var(--black);color:var(--white);border-color:var(--black)}
.modal-add-btn{padding:1rem;background:var(--black);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;margin-top:auto}
.modal-add-btn:hover{background:var(--gold);color:var(--black)}
.auth-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.7);z-index:5000;display:none;align-items:center;justify-content:center}
.auth-overlay.open{display:flex}
.auth-modal{background:var(--white);padding:3rem;width:90%;max-width:420px;position:relative}
.auth-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--mid)}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin-bottom:0.5rem}
.auth-tabs{display:flex;margin-bottom:2rem;border-bottom:1px solid rgba(10,10,10,0.1)}
.auth-tab{padding:0.8rem 1.5rem;background:none;border:none;font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;color:var(--mid);border-bottom:2px solid transparent;margin-bottom:-1px}
.auth-tab.active{color:var(--black);border-bottom-color:var(--gold)}
.auth-input-group{margin-bottom:1.2rem}
.auth-input-group label{display:block;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--mid);margin-bottom:0.4rem}
.auth-input-group input,.auth-input-group select{width:100%;padding:0.9rem 1rem;border:1px solid rgba(10,10,10,0.15);background:var(--cream);font-family:'Montserrat',sans-serif;font-size:0.8rem;outline:none;transition:border 0.3s}
.auth-input-group input:focus{border-color:var(--gold)}
.auth-error{color:var(--accent);font-size:0.65rem;letter-spacing:0.1em;margin-bottom:0.8rem;min-height:1.2rem}
.auth-submit-btn{width:100%;padding:1rem;background:var(--black);color:var(--white);border:none;font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.3em;text-transform:uppercase;cursor:pointer;transition:background 0.3s}
.auth-submit-btn:hover{background:var(--gold);color:var(--black)}
.checkout-form-overlay{position:fixed;inset:0;background:rgba(10,10,10,0.7);z-index:5000;display:none;align-items:center;justify-content:center;padding:1rem}
.checkout-form-overlay.open{display:flex}
.checkout-form-modal{background:var(--white);padding:2.5rem;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;position:relative}
.checkout-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
footer{background:var(--black);color:var(--white);padding:4rem 4rem 2rem;margin-top:4rem}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:2rem;border-top:1px solid rgba(245,240,235,0.1);font-size:0.6rem;color:var(--mid);letter-spacing:0.15em}
@media(max-width:1024px){nav{padding:1rem 2rem}.collections-hero{padding:7rem 2rem 3rem}.filter-bar{padding:1rem 2rem}.collections-main{padding:2rem}.products-grid{grid-template-columns:repeat(3,1fr);gap:1.5rem}footer{padding:3rem 2rem 2rem}}
@media(max-width:768px){nav{padding:0.8rem 1rem}.nav-logo{font-size:1.3rem}.collections-hero{padding:6rem 1.2rem 2rem}.collections-hero h1{font-size:2.2rem}.filter-bar{padding:0.8rem 1rem;top:55px;gap:0.5rem}.filter-tab{padding:0.4rem 0.8rem;font-size:0.55rem}.results-count{display:none}.collections-main{padding:1.5rem 0.8rem}.products-grid{grid-template-columns:repeat(2,1fr);gap:0.8rem}.product-info{padding:0.6rem 0.2rem}.product-name{font-size:0.95rem}.product-category{font-size:0.5rem}.product-price{font-size:0.7rem}.price-current,.price-sale{font-size:0.7rem}.price-original{font-size:0.6rem}.product-actions-overlay{opacity:1;background:rgba(10,10,10,0.15)}.quick-add{transform:translateY(0);font-size:0.5rem;padding:0.5rem 0.6rem;letter-spacing:0.08em}.wishlist-btn{opacity:1;transform:translateX(0);width:28px;height:28px;font-size:0.8rem}.modal{grid-template-columns:1fr;width:95%}.modal-image{aspect-ratio:4/3}.modal-info{padding:1.5rem}.cart-drawer{width:100%}footer{padding:2rem 1rem 1rem}.footer-bottom{flex-direction:column;gap:0.8rem;text-align:center}.checkout-row{grid-template-columns:1fr}.auth-modal{padding:2rem 1.2rem}.checkout-form-modal{padding:1.5rem 1rem}.notification{right:1rem;left:1rem;bottom:1rem;max-width:100%}}
@media(max-width:480px){.products-grid{grid-template-columns:repeat(2,1fr);gap:0.6rem}.collections-main{padding:1rem 0.6rem}.product-name{font-size:0.85rem}}
</style>
</head>
<body>
<div class="notification" id="notification"></div>
<nav>
  <a href="maj-attire-connected.html" class="nav-logo">M.A.J <span>Attire</span></a>
  <div class="nav-actions">
    <a href="maj-attire-connected.html" class="nav-back">← Home</a>
    <button class="cart-btn" onclick="openCart()" title="Cart">🛍 <span class="cart-count" id="cartCount">0</span></button>
    <div id="navAuthArea"></div>
  </div>
</nav>
<div class="collections-hero">
  <p class="breadcrumb"><a href="maj-attire-connected.html">Home</a> → Collections</p>
  <h1>Our <em>Collections</em></h1>
  <p id="heroCatLabel">All Products — M.A.J Attire</p>
</div>
<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" onclick="filterProducts('All',this)">All</button>
    <button class="filter-tab" onclick="filterProducts('Men',this)">Men</button>
    <button class="filter-tab" onclick="filterProducts('Summers',this)">Summers</button>
    <button class="filter-tab" onclick="filterProducts('Winters',this)">Winters</button>
    <button class="filter-tab" onclick="filterProducts('Traditional',this)">Traditional</button>
    <button class="filter-tab" onclick="filterProducts('Streetwear',this)">Streetwear</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search products..." oninput="searchProducts(this.value)">
    <span class="search-icon" id="searchIcon">🔍</span>
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <span class="results-count" id="resultsCount">Loading...</span>
  <select class="sort-select" id="sortSelect" onchange="applySort()">
    <option value="default">Sort: Default</option>
    <option value="price-low">Price: Low to High</option>
    <option value="price-high">Price: High to Low</option>
    <option value="new">New Arrivals</option>
    <option value="sale">On Sale</option>
  </select>
</div>
<div class="collections-main">
  <div class="products-grid" id="productsGrid">
    <div class="loading-state"><div class="loading-spinner"></div>Loading Collections...</div>
  </div>
</div>
<footer>
  <div class="footer-bottom">
    <span>© 2025 M.A.J Attire — All Rights Reserved</span>
    <span style="color:var(--gold);letter-spacing:0.3em">M.A.J ATTIRE</span>
    <span>Crafted with Purpose</span>
  </div>
</footer>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header"><h3>Shopping Bag</h3><button class="cart-close" onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">₨0</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="productModal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-image" id="modalImage"></div>
    <div class="modal-info">
      <p class="modal-category" id="modalCat"></p>
      <h2 class="modal-name" id="modalName"></h2>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-price" id="modalPrice"></div>
      <div><p class="size-label">Select Size</p><div class="size-options" id="modalSizes"></div></div>
      <button class="modal-add-btn" onclick="addToCartFromModal()">Add to Bag</button>
    </div>
  </div>
</div>
<div class="auth-overlay" id="authOverlay">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <h2 class="auth-title">Welcome</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login',this)">Sign In</button>
      <button class="auth-tab" onclick="switchTab('register',this)">Register</button>
    </div>
    <div id="loginForm">
      <div class="auth-input-group"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
      <div class="auth-input-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
      <p class="auth-error" id="loginError"></p>
      <button class="auth-submit-btn" onclick="doLogin()">Sign In</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-input-group"><label>Full Name</label><input type="text" id="regName" placeholder="Your Name"></div>
      <div class="auth-input-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
      <div class="auth-input-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="0300-1234567"></div>
      <div class="auth-input-group"><label>Password</label><input type="password" id="regPass" placeholder="••••••••"></div>
      <p class="auth-error" id="regError"></p>
      <button class="auth-submit-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>
<div class="checkout-form-overlay" id="checkoutFormOverlay">
  <div class="checkout-form-modal">
    <button class="auth-close" onclick="closeCheckoutForm()">✕</button>
    <h2 class="auth-title" style="margin-bottom:1.5rem">Complete Order</h2>
    <div id="checkoutSummary" style="background:var(--cream);padding:1rem;margin-bottom:1.5rem;font-size:0.75rem;"></div>
    <div class="auth-input-group"><label>Full Name</label><input type="text" id="shipName" placeholder="Your Name"></div>
    <div class="auth-input-group"><label>Phone Number</label><input type="tel" id="shipPhone" placeholder="0300-1234567"></div>
    <div class="auth-input-group"><label>Delivery Address</label><input type="text" id="shipAddress" placeholder="House #, Street, Area"></div>
    <div class="checkout-row">
      <div class="auth-input-group"><label>City</label><input type="text" id="shipCity" placeholder="Karachi"></div>
      <div class="auth-input-group"><label>Payment</label><select id="paymentMethod"><option value="COD">Cash on Delivery</option><option value="Bank">Bank Transfer</option></select></div>
    </div>
    <p class="auth-error" id="checkoutError"></p>
    <button class="auth-submit-btn" onclick="submitOrder()">Place Order 🎉</button>
  </div>
</div>
<script>
const API='https://maj-attire-backend-production.up.railway.app/api';
let allProducts=[],filteredProducts=[],cart=JSON.parse(localStorage.getItem('maj_cart')||'[]');
let activeCategory='All', activeSearch='';
let currentUser=JSON.parse(localStorage.getItem('maj_user')||'null');
let authToken=localStorage.getItem('maj_token')||null;
let currentModalProduct=null,currentSelectedSize=null;

window.addEventListener('DOMContentLoaded',()=>{
  updateNavAuth();updateCartCount();
  const params=new URLSearchParams(window.location.search);
  const cat=params.get('cat');
  const search=params.get('search');
  if(cat){
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.toggle('active',b.textContent.trim()===cat));
    document.getElementById('heroCatLabel').textContent=cat+' Collection — M.A.J Attire';
    loadProducts(cat);
  } else { loadProducts('All'); }
  if(search){
    const inp=document.getElementById('searchInput');
    if(inp){
      inp.value=search;
      activeSearch=search.toLowerCase();
      inp.dispatchEvent(new Event('input'));
    }
  }
});

async function loadProducts(category='All'){
  const grid=document.getElementById('productsGrid');
  grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--mid);font-size:0.75rem;letter-spacing:0.1em;">Loading...</div>';
  try{
    const url=category&&category!=='All'?`${API}/products?category=${encodeURIComponent(category)}`:`${API}/products`;
    const res=await fetch(url, {
      method: 'GET',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      mode: 'cors'
    });
    const data=await res.json();
    allProducts=data.products||data||[];
    filteredProducts=[...allProducts];
    document.getElementById('resultsCount').textContent=filteredProducts.length+' products';
    renderProducts();
  }catch(e){
    console.error('Load error:', e);
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--mid);font-size:0.75rem;">Error: '+e.message+'</div>';
  }
}


function renderProducts(){
  const grid=document.getElementById('productsGrid');
  document.getElementById('resultsCount').textContent=filteredProducts.length+' products';
  if(filteredProducts.length===0){
    grid.innerHTML='<div class="no-results"><div class="no-results-icon">🔍</div><h3>No products found</h3><p>'+(activeSearch?'"'+activeSearch+'" se koi product nahi mila':'This category is empty')+'</p></div>';
    return;
  }
  grid.innerHTML=filteredProducts.map((p,i)=>`
    <div class="product-card" style="animation-delay:${i*0.05}s" onclick="window.location.href='product.html?id='+${p.id}">
      <div class="product-image">
        <div class="product-img-bg ${p.pattern||'pattern-weave'}"></div>
        ${p.badge?`<span class="product-badge ${p.badge==='Sale'?'sale':'new'}">${p.badge}</span>`:''}
        <div class="product-actions-overlay">
          <button class="quick-add" onclick="event.stopPropagation();quickAddToCart(${p.id})">Add to Bag</button>
        </div>
        <button class="wishlist-btn" onclick="event.stopPropagation();toggleWishlist(${p.id})" id="wl-${p.id}">♡</button>
      </div>
      <div class="product-info">
        <p class="product-category">${p.category}</p>
        <h3 class="product-name">${p.name}</h3>
        <div class="product-price">
          ${p.orig_price?`<span class="price-original">₨${Number(p.orig_price).toLocaleString()}</span>`:''}
          <span class="${p.orig_price?'price-sale':'price-current'}">₨${Number(p.price).toLocaleString()}</span>
        </div>

      </div>
    </div>`).join('');
}

function filterProducts(cat,btn){
  activeCategory=cat;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  applyAllFilters();
}

function searchProducts(val){
  activeSearch=val.trim().toLowerCase();
  const clearBtn=document.getElementById('searchClear');
  const icon=document.getElementById('searchIcon');
  if(activeSearch){clearBtn.style.display='block';icon.style.display='none';}
  else{clearBtn.style.display='none';icon.style.display='block';}
  applyAllFilters();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  activeSearch='';
  document.getElementById('searchClear').style.display='none';
  document.getElementById('searchIcon').style.display='block';
  applyAllFilters();
}

function applyAllFilters(){
  const sort=document.getElementById('sortSelect').value;
  filteredProducts=[...allProducts];
  // Category filter
  if(activeCategory&&activeCategory!=='All')filteredProducts=filteredProducts.filter(p=>p.category===activeCategory||p.category.includes(activeCategory));
  // Search filter
  if(activeSearch)filteredProducts=filteredProducts.filter(p=>(p.name||'').toLowerCase().includes(activeSearch)||(p.category||'').toLowerCase().includes(activeSearch)||(p.description||'').toLowerCase().includes(activeSearch));
  // Sort
  if(sort==='price-low')filteredProducts.sort((a,b)=>a.price-b.price);
  else if(sort==='price-high')filteredProducts.sort((a,b)=>b.price-a.price);
  else if(sort==='new')filteredProducts=filteredProducts.filter(p=>p.badge==='New').concat(filteredProducts.filter(p=>p.badge!=='New'));
  else if(sort==='sale')filteredProducts=filteredProducts.filter(p=>p.badge==='Sale').concat(filteredProducts.filter(p=>p.badge!=='Sale'));
  renderProducts();
}

function applySort(){applyAllFilters();}

function openModal(id){
  const p=allProducts.find(x=>x.id===id);if(!p)return;
  currentModalProduct=p;currentSelectedSize=null;
  document.getElementById('modalCat').textContent=p.category;
  document.getElementById('modalName').textContent=p.name;
  document.getElementById('modalDesc').textContent=p.description||'';
  document.getElementById('modalImage').innerHTML=`<div class="product-img-bg ${p.pattern||'pattern-weave'}" style="height:100%"></div>`;
  document.getElementById('modalPrice').innerHTML=p.orig_price
    ?`<span style="color:var(--mid);text-decoration:line-through;font-size:0.9rem;margin-right:0.5rem">₨${Number(p.orig_price).toLocaleString()}</span><span style="color:var(--accent)">₨${Number(p.price).toLocaleString()}</span>`
    :`₨${Number(p.price).toLocaleString()}`;
  const sizes=JSON.parse(p.sizes||'["S","M","L","XL"]');
  document.getElementById('modalSizes').innerHTML=sizes.map(s=>`<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('');
  document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function selectSize(size,btn){currentSelectedSize=size;document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
function closeModal(e){if(e.target===document.getElementById('modalOverlay')){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}}
function closeModalBtn(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function addToCartFromModal(){if(!currentModalProduct)return;if(!currentSelectedSize){showNotification('Please select a size');return;}addItemToCart(currentModalProduct,currentSelectedSize);closeModalBtn();}
function quickAddToCart(id){const p=allProducts.find(x=>x.id===id);if(!p)return;const sizes=JSON.parse(p.sizes||'["M"]');addItemToCart(p,sizes[0]);}
function addItemToCart(product,size){const existing=cart.find(i=>i.id===product.id&&i.size===size);if(existing)existing.qty++;else cart.push({id:product.id,name:product.name,price:product.price,size,qty:1,pattern:product.pattern});localStorage.setItem('maj_cart',JSON.stringify(cart));updateCartCount();showNotification('Added to bag: '+product.name);}
function updateCartCount(){const total=cart.reduce((s,i)=>s+i.qty,0);const el=document.getElementById('cartCount');el.textContent=total;el.classList.toggle('visible',total>0);renderCartItems();}
function renderCartItems(){const el=document.getElementById('cartItems');const totalEl=document.getElementById('cartTotal');if(cart.length===0){el.innerHTML='<div class="cart-empty">Your bag is empty</div>';totalEl.textContent='₨0';return;}el.innerHTML=cart.map((item,i)=>`<div class="cart-item"><div class="cart-item-img"><div class="product-img-bg ${item.pattern||'pattern-weave'}" style="height:100%"></div></div><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-details">Size: ${item.size} · Qty: ${item.qty}</div><div class="cart-item-price">₨${(item.price*item.qty).toLocaleString()}</div></div><button class="cart-item-remove" onclick="removeFromCart(${i})">✕</button></div>`).join('');const total=cart.reduce((s,i)=>s+i.price*i.qty,0);totalEl.textContent='₨'+total.toLocaleString();}
function removeFromCart(idx){cart.splice(idx,1);localStorage.setItem('maj_cart',JSON.stringify(cart));updateCartCount();}
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');document.body.style.overflow='';}
async function toggleWishlist(id){if(!authToken){showNotification('Please sign in to save wishlist');openAuth();return;}try{const res=await fetch(`${API}/wishlist/toggle`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},body:JSON.stringify({product_id:id})});const data=await res.json();const btn=document.getElementById('wl-'+id);if(data.action==='added'){if(btn){btn.textContent='♥';btn.style.color='var(--accent)';}showNotification('Added to wishlist');}else{if(btn){btn.textContent='♡';btn.style.color='';}showNotification('Removed from wishlist');}}catch(e){showNotification('Could not update wishlist');}}
function updateNavAuth(){const area=document.getElementById('navAuthArea');if(currentUser){area.innerHTML=`<span style="font-size:0.6rem;letter-spacing:0.1em;color:var(--gold);margin-right:0.5rem">Hi, ${currentUser.name.split(' ')[0]}</span><button onclick="doLogout()" style="background:none;border:1px solid rgba(201,169,110,0.4);color:var(--gold);font-size:0.55rem;letter-spacing:0.15em;padding:0.4rem 0.8rem;cursor:pointer;">Logout</button>`;}else{area.innerHTML=`<button onclick="openAuth()" style="background:none;border:1px solid rgba(201,169,110,0.4);color:var(--white);font-size:0.6rem;letter-spacing:0.2em;padding:0.5rem 1rem;cursor:pointer;font-family:'Montserrat',sans-serif;">SIGN IN</button>`;}}
function openAuth(){document.getElementById('authOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeAuth(){document.getElementById('authOverlay').classList.remove('open');document.body.style.overflow='';}
function switchTab(tab,btn){document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.getElementById('loginForm').style.display=tab==='login'?'block':'none';document.getElementById('registerForm').style.display=tab==='register'?'block':'none';}
async function doLogin(){const email=document.getElementById('loginEmail').value;const password=document.getElementById('loginPass').value;document.getElementById('loginError').textContent='';try{const res=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(!res.ok){document.getElementById('loginError').textContent=data.error||'Login failed';return;}authToken=data.token;currentUser=data.customer;localStorage.setItem('maj_token',authToken);localStorage.setItem('maj_user',JSON.stringify(currentUser));updateNavAuth();closeAuth();showNotification('Welcome back, '+currentUser.name.split(' ')[0]+'!');}catch(e){document.getElementById('loginError').textContent='Connection error';}}
async function doRegister(){const name=document.getElementById('regName').value;const email=document.getElementById('regEmail').value;const phone=document.getElementById('regPhone').value;const password=document.getElementById('regPass').value;document.getElementById('regError').textContent='';try{const res=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,password})});const data=await res.json();if(!res.ok){document.getElementById('regError').textContent=data.error||'Registration failed';return;}authToken=data.token;currentUser=data.customer;localStorage.setItem('maj_token',authToken);localStorage.setItem('maj_user',JSON.stringify(currentUser));updateNavAuth();closeAuth();showNotification('Welcome to M.A.J Attire, '+currentUser.name.split(' ')[0]+'!');}catch(e){document.getElementById('regError').textContent='Connection error';}}
function doLogout(){authToken=null;currentUser=null;localStorage.removeItem('maj_token');localStorage.removeItem('maj_user');updateNavAuth();showNotification('Logged out successfully');}
function checkout(){if(cart.length===0)return;if(!currentUser){closeCart();openAuth();showNotification('Please sign in to checkout');return;}const summary=document.getElementById('checkoutSummary');const total=cart.reduce((sum,i)=>sum+i.price*i.qty,0);summary.innerHTML='<strong style="font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;">Order Summary</strong><br><br>'+cart.map(i=>`<div style="display:flex;justify-content:space-between;margin-bottom:0.3rem"><span>${i.name} (${i.size}) x${i.qty}</span><span>₨${(i.price*i.qty).toLocaleString()}</span></div>`).join('')+`<div style="display:flex;justify-content:space-between;border-top:1px solid rgba(10,10,10,0.1);margin-top:0.8rem;padding-top:0.8rem;font-weight:700"><span>Total</span><span>₨${total.toLocaleString()}</span></div>`;document.getElementById('shipName').value=currentUser.name||'';document.getElementById('shipPhone').value=currentUser.phone||'';document.getElementById('shipCity').value=currentUser.city||'';closeCart();document.getElementById('checkoutFormOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeCheckoutForm(){document.getElementById('checkoutFormOverlay').classList.remove('open');document.body.style.overflow='';}
async function submitOrder(){const shipName=document.getElementById('shipName').value;const shipPhone=document.getElementById('shipPhone').value;const shipAddress=document.getElementById('shipAddress').value;const shipCity=document.getElementById('shipCity').value;const paymentMethod=document.getElementById('paymentMethod').value;if(!shipName||!shipPhone||!shipAddress||!shipCity){document.getElementById('checkoutError').textContent='Please fill all fields';return;}try{const total=cart.reduce((sum,i)=>sum+i.price*i.qty,0);const res=await fetch(`${API}/orders`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+authToken},body:JSON.stringify({items:cart.map(i=>({product_id:i.id,quantity:i.qty,size:i.size,price:i.price})),total_amount:total,shipping_name:shipName,shipping_phone:shipPhone,shipping_address:shipAddress,shipping_city:shipCity,payment_method:paymentMethod})});const data=await res.json();if(!res.ok){document.getElementById('checkoutError').textContent=data.error||'Order failed';return;}cart=[];localStorage.setItem('maj_cart',JSON.stringify(cart));updateCartCount();closeCheckoutForm();showNotification('Order placed! Order #'+data.order_id);}catch(e){document.getElementById('checkoutError').textContent='Connection error';}}
function showNotification(msg){const el=document.getElementById('notification');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000);}
</script>
</body>
</html>
